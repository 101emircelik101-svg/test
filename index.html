<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARADOX // Culinary Atelier</title>
    <style>
        /* PREMIUM TYPOGRAPHY & RESET */
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Syne:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #0d0d0d;
            color: #f5f5f7;
            font-family: 'Syne', sans-serif;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0d0d0d;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }

        /* NAVIGATION */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: #f5f5f7;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.1em;
            transition: opacity 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 0.5;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 50px;
        }

        .hero-title-container {
            text-align: center;
            z-index: 2;
        }

        .hero-sub {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: #ff5500; /* High contrast accent color */
            margin-bottom: 20px;
        }

        .hero-main-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 8vw;
            font-weight: 700;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -0.03em;
        }

        .hero-main-title span {
            display: block;
            color: transparent;
            -webkit-text-stroke: 1px #f5f5f7;
        }

        /* BACKGROUND ABSTRACT ELEMENTS */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,85,0,0.08) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* INTERACTIVE MENU EXPERIENCE SECTION */
        .interactive-section {
            padding: 150px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 80px;
        }

        /* PREMIUM KINETIC LIST HOVER EFFECT */
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            border-bottom: 1px solid #222;
            cursor: pointer;
            position: relative;
            transition: padding-left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .menu-item:hover {
            padding-left: 30px;
            border-bottom-color: #f5f5f7;
        }

        .item-number {
            font-size: 1rem;
            font-family: 'Syncopate', sans-serif;
            color: #444;
            margin-right: 40px;
        }

        .item-text h3 {
            font-size: 3.5vw;
            font-weight: 500;
            text-transform: uppercase;
            line-height: 1;
            transition: color 0.3s ease;
        }

        .menu-item:hover .item-text h3 {
            color: #ff5500;
        }

        .item-meta {
            text-align: right;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #888;
        }

        /* CALL TO ACTION BUTTON */
        .cta-container {
            margin-top: 100px;
            display: flex;
            justify-content: center;
        }

        .premium-btn {
            background: none;
            border: 1px solid #f5f5f7;
            color: #f5f5f7;
            padding: 25px 60px;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.4s ease;
        }

        .premium-btn::before {
            content: '';
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f5f5f7;
            z-index: -1;
            transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .premium-btn:hover {
            color: #0d0d0d;
        }

        .premium-btn:hover::before {
            top: 0;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            nav { padding: 20px; }
            .nav-links { display: none; }
            .hero-main-title { font-size: 12vw; }
            .item-text h3 { font-size: 6vw; }
            .item-meta { display: none; }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND GLOW -->
    <div class="bg-glow"></div>

    <!-- NAVIGATION -->
    <nav>
        <div class="logo">PRDX</div>
        <div class="nav-links">
            <a href="#experience">Experience</a>
            <a href="#menu">Atelier</a>
            <a href="#reserve">Reserve</a>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-title-container">
            <p class="hero-sub">A Taste of the Unseen</p>
            <h1 class="hero-main-title">Taste The<br><span>Paradox</span></h1>
        </div>
    </section>

    <!-- INTERACTIVE CONTENT SECTION -->
    <section class="interactive-section" id="menu">
        <p class="section-label">// THE EXPERIMENTAL CHAPTERS</p>

        <!-- MENU ITEM 1 -->
        <div class="menu-item">
            <div style="display: flex; align-items: center;">
                <span class="item-number">01</span>
                <div class="item-text">
                    <h3>Liquid Nitrogen Smoke</h3>
                </div>
            </div>
            <div class="item-meta">CHAPTER I // $45</div>
        </div>

        <!-- MENU ITEM 2 -->
        <div class="menu-item">
            <div style="display: flex; align-items: center;">
                <span class="item-number">02</span>
                <div class="item-text">
                    <h3>Edible Geometry structures</h3>
                </div>
            </div>
            <div class="item-meta">CHAPTER II // $70</div>
        </div>

        <!-- MENU ITEM 3 -->
        <div class="menu-item">
            <div style="display: flex; align-items: center;">
                <span class="item-number">03</span>
                <div class="item-text">
                    <h3>The Hyper-Local Forest</h3>
                </div>
            </div>
            <div class="item-meta">CHAPTER III // $110</div>
        </div>

        <!-- CALL TO ACTION -->
        <div class="cta-container">
            <button class="premium-btn">Secure a Seat</button>
        </div>
    </section>

</body>
</html>
